version: '3.8'

services:
  nginx:
    image: nginx:alpine               # готовый образ, без Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./laravel:/var/www/html:rw    # статика Laravel
    depends_on:
      - laravel
      - fastapi
    networks:
      - backend

  laravel:
    build:
      context: .
      dockerfile: laravel/Dockerfile
    volumes:
      - ./laravel:/var/www/html:rw
    env_file:
      - ./laravel/.env                # ваш локальный .env для Laravel
    depends_on:
      - mysql
      - redis
    networks:
      - backend
      - db_redis

  fastapi:
    build:
      context: .
      dockerfile: fastapi/Dockerfile
    volumes:
      - ./fastapi/app:/app
    env_file:
      - ./fastapi/.env
    depends_on:
      - mysql
      - redis
    networks:
      - backend
      - db_redis

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    env_file:
      - ./laravel/.env
    networks:
      - db_redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - db_redis

volumes:
  mysql_data:

networks:
  backend:
    driver: bridge
  db_redis:
    driver: bridge